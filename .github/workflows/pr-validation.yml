name: PR Validation

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Validate Dockerfile
        run: docker build -t vreshch-com:pr-${{ github.event.pull_request.number }} .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Checkout base branch screenshots
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch

      - name: Copy base screenshots as baselines
        run: |
          if [ -d "base-branch/e2e/screenshots" ]; then
            cp base-branch/e2e/screenshots/*.png e2e/screenshots/ 2>/dev/null || true
            echo "Copied base branch screenshots as baselines"
            ls -la e2e/screenshots/
          else
            echo "No base screenshots found — first run will generate baselines"
          fi

      - name: Run E2E tests (visual warnings only)
        id: e2e
        continue-on-error: true
        env:
          CI: true
          VISUAL_MODE: warning
        run: npx playwright test 2>&1 | tee e2e-output.txt

      - name: Collect screenshot diffs
        if: always()
        run: |
          mkdir -p e2e/screenshots-after
          mkdir -p e2e/screenshots-before
          mkdir -p e2e/screenshots-diff

          if [ -d "test-results" ]; then
            find test-results -name "*-actual.png" | while read f; do
              name=$(basename "$f" | sed 's/-actual\.png/.png/')
              cp "$f" "e2e/screenshots-after/$name"
            done

            find test-results -name "*-expected.png" | while read f; do
              name=$(basename "$f" | sed 's/-expected\.png/.png/')
              cp "$f" "e2e/screenshots-before/$name"
            done

            find test-results -name "*-diff.png" | while read f; do
              name=$(basename "$f" | sed 's/-diff\.png/.png/')
              cp "$f" "e2e/screenshots-diff/$name"
            done
          fi

          echo "=== Screenshots with diffs ==="
          ls e2e/screenshots-diff/ 2>/dev/null || echo "No diffs detected"

      - name: Push diff images to temp branch
        if: always()
        run: |
          DIFF_BRANCH="visual-diff/pr-${{ github.event.pull_request.number }}"
          HAS_DIFFS=$(ls e2e/screenshots-diff/*.png 2>/dev/null | wc -l)

          if [ "$HAS_DIFFS" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git checkout --orphan "$DIFF_BRANCH"
            git rm -rf . > /dev/null 2>&1 || true

            mkdir -p before after diff
            cp e2e/screenshots-before/*.png before/ 2>/dev/null || true
            cp e2e/screenshots-after/*.png after/ 2>/dev/null || true
            cp e2e/screenshots-diff/*.png diff/ 2>/dev/null || true

            git add before/ after/ diff/
            git commit -m "Visual regression screenshots for PR #${{ github.event.pull_request.number }}" --no-verify
            git push origin "$DIFF_BRANCH" --force
            echo "DIFF_BRANCH=$DIFF_BRANCH" >> $GITHUB_ENV
            echo "HAS_IMAGES=true" >> $GITHUB_ENV
          else
            echo "HAS_IMAGES=false" >> $GITHUB_ENV
          fi

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: |
            e2e/screenshots-before/
            e2e/screenshots-after/
            e2e/screenshots-diff/
            test-results/
          retention-days: 14

      - name: Comment on PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const jobStatus = '${{ job.status }}';
            const e2eStatus = '${{ steps.e2e.outcome }}';
            const hasImages = '${{ env.HAS_IMAGES }}' === 'true';
            const prNumber = ${{ github.event.pull_request.number }};
            const repo = '${{ github.repository }}';
            const diffBranch = `visual-diff/pr-${prNumber}`;
            const rawBase = `https://raw.githubusercontent.com/${repo}/${diffBranch}`;

            const statusIcon = jobStatus === 'success' ? '✅' : '❌';
            const e2eIcon = e2eStatus === 'success' ? '✅' : '⚠️';

            // Collect diff files
            const diffDir = 'e2e/screenshots-diff';
            let diffFiles = [];
            try {
              diffFiles = fs.readdirSync(diffDir).filter(f => f.endsWith('.png'));
            } catch {}

            // Build checks table
            const checksTable = [
              `| Step | Status |`,
              `|------|--------|`,
              `| 📦 Dependencies | ${statusIcon} |`,
              `| 🔍 Linting | ${statusIcon} |`,
              `| 🏗️ Build | ${statusIcon} |`,
              `| 🐳 Docker | ${statusIcon} |`,
              `| 🎭 E2E Tests | ${e2eIcon} |`,
            ].join('\n');

            // Build visual diff section with embedded images
            let visualSection = '';

            if (diffFiles.length > 0 && hasImages) {
              visualSection += `\n### 🔄 Visual Changes Detected (${diffFiles.length} screenshot${diffFiles.length > 1 ? 's' : ''})\n\n`;

              for (const file of diffFiles) {
                const pageName = file.replace('.png', '').replace(/-/g, ' ');
                const beforeUrl = `${rawBase}/before/${file}`;
                const afterUrl = `${rawBase}/after/${file}`;
                const diffUrl = `${rawBase}/diff/${file}`;

                visualSection += `<details>\n`;
                visualSection += `<summary>📸 <strong>${pageName}</strong></summary>\n\n`;
                visualSection += `| Before | After | Diff |\n`;
                visualSection += `|--------|-------|------|\n`;
                visualSection += `| <img src="${beforeUrl}" width="300" /> | <img src="${afterUrl}" width="300" /> | <img src="${diffUrl}" width="300" /> |\n\n`;
                visualSection += `</details>\n\n`;
              }
            } else if (diffFiles.length > 0) {
              visualSection += `\n### 🔄 Visual Changes Detected\n\n`;
              visualSection += `> ⬇️ Download the **visual-regression-screenshots** artifact to review before/after/diff images.\n\n`;
              for (const file of diffFiles) {
                const pageName = file.replace('.png', '').replace(/-/g, ' ');
                visualSection += `- 🔄 **${pageName}**\n`;
              }
            } else {
              visualSection += `\n### ✅ Visual Regression\n\nAll pages match baselines — no visual changes detected.\n`;
            }

            // Page status table
            const pages = ['home', 'cv', 'interests', 'projects', 'chemistry-js', 'contacts'];
            const pageRows = pages.map(p => {
              const hasDesktop = diffFiles.includes(`${p}-desktop.png`);
              const hasMobile = diffFiles.includes(`${p}-mobile.png`);
              const icon = hasDesktop || hasMobile ? '🔄' : '✅';
              const parts = [];
              if (hasDesktop) parts.push('🖥️ desktop');
              if (hasMobile) parts.push('📱 mobile');
              const detail = parts.length > 0 ? parts.join(', ') : 'no changes';
              return `| ${icon} ${p} | ${detail} |`;
            }).join('\n');

            const mergeStatus = jobStatus === 'success' && e2eStatus === 'success'
              ? '🚀 **Ready to merge!**'
              : '⚠️ **Review changes before merging.**';

            const body = [
              `## 🔍 PR Validation ${statusIcon}`,
              ``,
              `**Commit:** \`${{ github.sha }}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              ``,
              `### 📋 Checks`,
              checksTable,
              ``,
              visualSection,
              `### 📸 Page Screenshot Status`,
              `| Page | Viewports |`,
              `|------|-----------|`,
              pageRows,
              ``,
              mergeStatus,
              ``,
              `---`,
              `🔗 [View workflow run](https://github.com/${repo}/actions/runs/${{ github.run_id }}) | ⬇️ [Download screenshots](https://github.com/${repo}/actions/runs/${{ github.run_id }}#artifacts)`,
              `⏰ Generated: \`${new Date().toISOString()}\``,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('PR Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Cleanup diff branch (on PR close)
        if: github.event.action == 'closed'
        continue-on-error: true
        run: |
          git push origin --delete "visual-diff/pr-${{ github.event.pull_request.number }}" 2>/dev/null || true
