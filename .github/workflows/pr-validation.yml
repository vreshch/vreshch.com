name: PR Validation

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  validate:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Validate Dockerfile
        run: docker build -t vreshch-com:pr-${{ github.event.pull_request.number }} .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Extract base branch screenshots
        run: |
          mkdir -p /tmp/screenshots-base
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git show "${BASE_SHA}":e2e/screenshots/ 2>/dev/null | \
            grep '\.png$' | while read f; do
              git show "${BASE_SHA}:e2e/screenshots/${f}" > "/tmp/screenshots-base/${f}" 2>/dev/null || true
            done
          echo "Base screenshots:"
          ls /tmp/screenshots-base/ 2>/dev/null || echo "None found"

      - name: Copy base screenshots as baselines
        run: |
          if ls /tmp/screenshots-base/*.png 1>/dev/null 2>&1; then
            cp /tmp/screenshots-base/*.png e2e/screenshots/
            echo "Copied base branch screenshots as baselines"
          else
            echo "No base screenshots found — first run will generate baselines"
          fi

      - name: Run E2E tests (visual warnings only)
        id: e2e
        continue-on-error: true
        env:
          CI: true
          VISUAL_MODE: warning
        run: npx playwright test 2>&1 | tee e2e-output.txt

      - name: Collect current screenshots
        if: always()
        run: |
          mkdir -p /tmp/screenshots-current
          if [ -d "test-results" ]; then
            find test-results -name "*-actual.png" | while read f; do
              name=$(basename "$f" | sed 's/-actual\.png/.png/')
              cp "$f" "/tmp/screenshots-current/$name"
            done
          fi
          for f in e2e/screenshots/*.png; do
            name=$(basename "$f")
            if [ ! -f "/tmp/screenshots-current/$name" ]; then
              cp "$f" "/tmp/screenshots-current/$name"
            fi
          done
          echo "Current screenshots:"
          ls /tmp/screenshots-current/

      - name: Run smart diff comparison
        if: always()
        run: |
          node scripts/compare-screenshots.js \
            /tmp/screenshots-base \
            /tmp/screenshots-current \
            --output /tmp/comparison.json \
            --diff-dir /tmp/screenshot-diffs \
            --highlight-dir /tmp/screenshot-highlights

      - name: Upload individual image artifacts
        if: always()
        run: |
          # Read changed files from comparison report
          CHANGED=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/comparison.json','utf-8'));
            r.images.filter(i => i.status === 'changed').forEach(i => console.log(i.name));
          ")

          # Stage each changed image into its own directory for upload
          mkdir -p /tmp/artifacts
          echo "$CHANGED" | while IFS= read -r name; do
            [ -z "$name" ] && continue
            slug="${name%.png}"

            mkdir -p "/tmp/artifacts/${slug}/before"
            mkdir -p "/tmp/artifacts/${slug}/after"
            mkdir -p "/tmp/artifacts/${slug}/highlight"

            cp "/tmp/screenshots-base/$name" "/tmp/artifacts/${slug}/before/$name" 2>/dev/null || true
            cp "/tmp/screenshots-current/$name" "/tmp/artifacts/${slug}/after/$name" 2>/dev/null || true
            cp "/tmp/screenshot-highlights/highlight-$name" "/tmp/artifacts/${slug}/highlight/highlight-$name" 2>/dev/null || true
          done

          echo "Staged artifacts:"
          find /tmp/artifacts -name "*.png" | sort

      - name: Upload before screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-before
          path: /tmp/screenshots-base/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload after screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-after
          path: /tmp/screenshots-current/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload smart diff highlights
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-highlights
          path: /tmp/screenshot-highlights/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload raw diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-diffs
          path: /tmp/screenshot-diffs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report
          path: /tmp/comparison.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Comment on PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const jobStatus = '${{ job.status }}';
            const e2eStatus = '${{ steps.e2e.outcome }}';
            const prNumber = ${{ github.event.pull_request.number }};
            const runId = '${{ github.run_id }}';
            const repo = '${{ github.repository }}';
            const [owner, repoName] = repo.split('/');

            const statusIcon = jobStatus === 'success' ? '✅' : '❌';
            const e2eIcon = e2eStatus === 'success' ? '✅' : '⚠️';

            // Read comparison report
            let report = { images: [], summary: { total: 0, changed: 0, added: 0, removed: 0, unchanged: 0 } };
            try {
              report = JSON.parse(fs.readFileSync('/tmp/comparison.json', 'utf-8'));
            } catch {}

            // Get artifact URLs via API
            const artifactMap = new Map();
            try {
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner, repo: repoName,
                per_page: 20,
              });
              for (const a of artifacts.data.artifacts) {
                if (a.workflow_run?.id === Number(runId)) {
                  artifactMap.set(a.name, `https://github.com/${repo}/actions/runs/${runId}/artifacts/${a.id}`);
                }
              }
            } catch (e) {
              console.log('Failed to fetch artifacts:', e.message);
            }

            const beforeArtifactUrl = artifactMap.get('screenshots-before') || '';
            const afterArtifactUrl = artifactMap.get('screenshots-after') || '';
            const highlightsArtifactUrl = artifactMap.get('screenshots-highlights') || '';
            const diffsArtifactUrl = artifactMap.get('screenshots-diffs') || '';

            const { summary } = report;
            const changedImages = report.images.filter(i => i.status === 'changed');
            const addedImages = report.images.filter(i => i.status === 'added');
            const removedImages = report.images.filter(i => i.status === 'removed');

            // Checks table
            const checksTable = [
              `| Step | Status |`,
              `|------|--------|`,
              `| 📦 Dependencies | ${statusIcon} |`,
              `| 🔍 Linting | ${statusIcon} |`,
              `| 🏗️ Build | ${statusIcon} |`,
              `| 🐳 Docker | ${statusIcon} |`,
              `| 🎭 E2E Tests | ${e2eIcon} |`,
            ].join('\n');

            // Visual section
            let visualSection = '';

            if (changedImages.length > 0) {
              visualSection += `\n### 🔄 Visual Changes (${changedImages.length} of ${summary.total} screenshots)\n\n`;
              visualSection += `| 📊 | Count |\n|-----|-------|\n`;
              visualSection += `| 🔄 Changed | ${summary.changed} |\n`;
              if (summary.added > 0) visualSection += `| 🆕 Added | ${summary.added} |\n`;
              if (summary.removed > 0) visualSection += `| 🗑️ Removed | ${summary.removed} |\n`;
              visualSection += `| ✅ Unchanged | ${summary.unchanged} |\n\n`;

              // Artifact download links
              const links = [];
              if (beforeArtifactUrl) links.push(`[🔙 Before](${beforeArtifactUrl})`);
              if (afterArtifactUrl) links.push(`[🔜 After](${afterArtifactUrl})`);
              if (highlightsArtifactUrl) links.push(`[🔬 Smart Diff](${highlightsArtifactUrl})`);
              if (diffsArtifactUrl) links.push(`[📊 Raw Diff](${diffsArtifactUrl})`);
              if (links.length > 0) {
                visualSection += `> ⬇️ Download: ${links.join(' · ')}\n\n`;
              }

              for (const img of changedImages) {
                const pageName = img.name.replace('.png', '').replace(/-/g, ' ');
                const pct = img.changedPercent !== undefined ? ` — ${img.changedPercent}% changed` : '';
                const pixels = img.changedPixels !== undefined ? ` (${img.changedPixels.toLocaleString()} px)` : '';

                visualSection += `<details>\n`;
                visualSection += `<summary>📸 <strong>${pageName}</strong>${pct}${pixels}</summary>\n\n`;

                const hasHighlight = !img.resized && img.highlightPath;

                if (hasHighlight) {
                  visualSection += `| 🔙 Before | 🔜 After | 🔬 Smart Diff |\n`;
                  visualSection += `|-----------|----------|---------------|\n`;
                  visualSection += `| <img src="${beforeArtifactUrl}" alt="before-${img.name}" width="280" /> | <img src="${afterArtifactUrl}" alt="after-${img.name}" width="280" /> | <img src="${highlightsArtifactUrl}" alt="highlight-${img.name}" width="280" /> |\n\n`;
                } else {
                  visualSection += `| 🔙 Before | 🔜 After |\n`;
                  visualSection += `|-----------|----------|\n`;
                  visualSection += `| <img src="${beforeArtifactUrl}" alt="before-${img.name}" width="400" /> | <img src="${afterArtifactUrl}" alt="after-${img.name}" width="400" /> |\n\n`;
                }

                visualSection += `</details>\n\n`;
              }

              if (addedImages.length > 0) {
                visualSection += `#### 🆕 Added Screenshots\n`;
                for (const img of addedImages) {
                  visualSection += `- \`${img.name}\`\n`;
                }
                visualSection += '\n';
              }

              if (removedImages.length > 0) {
                visualSection += `#### 🗑️ Removed Screenshots\n`;
                for (const img of removedImages) {
                  visualSection += `- \`${img.name}\`\n`;
                }
                visualSection += '\n';
              }
            } else {
              visualSection += `\n### ✅ Visual Regression\n\n`;
              visualSection += `All ${summary.total} screenshots match baselines — no visual changes detected.\n\n`;
            }

            // Page status table
            const pages = ['home', 'cv', 'interests', 'projects', 'chemistry-js', 'contacts'];
            const pageRows = pages.map(p => {
              const desktopImg = report.images.find(i => i.name === `${p}-desktop.png`);
              const mobileImg = report.images.find(i => i.name === `${p}-mobile.png`);
              const desktopIcon = !desktopImg ? '➖' : desktopImg.status === 'changed' ? '🔄' : '✅';
              const mobileIcon = !mobileImg ? '➖' : mobileImg.status === 'changed' ? '🔄' : '✅';
              return `| ${p} | ${desktopIcon} | ${mobileIcon} |`;
            }).join('\n');

            const mergeStatus = jobStatus === 'success' && e2eStatus === 'success'
              ? '🚀 **Ready to merge!**'
              : '⚠️ **Review changes before merging.**';

            const body = [
              `## 🔍 PR Validation ${statusIcon}`,
              ``,
              `> **Commit:** \`${{ github.sha }}\` | **Branch:** \`${{ github.head_ref }}\``,
              ``,
              `### 📋 Checks`,
              checksTable,
              ``,
              visualSection,
              `### 📸 Page Status`,
              `| Page | 🖥️ Desktop | 📱 Mobile |`,
              `|------|-----------|----------|`,
              pageRows,
              ``,
              mergeStatus,
              ``,
              `---`,
              `🔗 [Workflow run](https://github.com/${repo}/actions/runs/${runId}) · ⬇️ [Download all screenshots](https://github.com/${repo}/actions/runs/${runId}#artifacts)`,
              `⏰ \`${new Date().toISOString()}\``,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('PR Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
